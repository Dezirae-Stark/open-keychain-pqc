apply plugin: 'com.android.library'

android {
    compileSdkVersion rootProject.ext.compileSdkVersion

    defaultConfig {
        minSdkVersion 15
        targetSdkVersion 28
        versionCode 114
        versionName "1.1.4"
        namespace 'org.sufficientlysecure.materialchips'

        testInstrumentationRunner "androidx.test.runner.AndroidJUnitRunner"

    }
    buildTypes {
        release {
            minifyEnabled false
            proguardFiles getDefaultProguardFile('proguard-android.txt'), 'proguard-rules.pro'
        }
    }
}

dependencies {
    implementation 'androidx.appcompat:appcompat:1.6.1'

    // recycler
    implementation 'androidx.recyclerview:recyclerview:1.3.2'
    // com.beloo.widget:ChipsLayoutManager was JCenter-only (dead, and its groupId returns
    // 401/"Repo not found" on JitPack). The upstream repo (Oleg-Beloy/ChipsLayoutManager,
    // formerly BelooS/ChipsLayoutManager) is still resolvable via JitPack under the
    // com.github.<owner> groupId; same version, same artifact contents.
    implementation 'com.github.BelooS:ChipsLayoutManager:0.3.7@aar'
}

